<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>a small world — terrarium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@1,300;1,500&family=Major+Mono+Display&family=DM+Mono:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
        "simplex-noise": "https://cdn.jsdelivr.net/npm/simplex-noise@4.0.3/dist/esm/simplex-noise.js"
      }
    }
  </script>
</head>
<body>
  <canvas id="scene"></canvas>

  <div class="grain"></div>
  <div class="vignette"></div>

  <header class="hud hud-top">
    <div class="title-block">
      <div class="eyebrow">field notes &nbsp;·&nbsp; vol. iii</div>
      <h1 class="title"><em>a small</em> world<span class="cursor">_</span></h1>
    </div>
    <div class="biome-card">
      <div class="label">current biome</div>
      <div class="biome-name" id="biome-name">—</div>
      <div class="biome-sub" id="biome-sub">awaiting genesis</div>
    </div>
  </header>

  <footer class="hud hud-bottom">
    <div class="stats">
      <div class="stat">
        <span class="label">seed</span>
        <span class="value" id="seed">0x0000</span>
      </div>
      <div class="stat">
        <span class="label">creatures</span>
        <span class="value" id="creature-count">00</span>
      </div>
      <div class="stat">
        <span class="label">flora</span>
        <span class="value" id="flora-count">00</span>
      </div>
      <div class="stat">
        <span class="label">birds</span>
        <span class="value" id="bird-count">00</span>
      </div>
      <div class="stat">
        <span class="label">elevation</span>
        <span class="value" id="elevation">000m</span>
      </div>
    </div>

    <div class="controls">
      <div class="hint">drag · zoom · observe</div>
      <button class="regen" id="regen">
        <span class="regen-glyph">↻</span>
        <span class="regen-label">regenerate world</span>
      </button>
    </div>
  </footer>

  <div class="corner corner-tl">+</div>
  <div class="corner corner-tr">+</div>
  <div class="corner corner-bl">+</div>
  <div class="corner corner-br">+</div>

  <button class="settings-toggle" id="settings-toggle" aria-label="settings" title="settings">
    <span class="settings-glyph">✦</span>
  </button>

  <aside class="settings-panel" id="settings-panel" aria-hidden="true">
    <div class="settings-head">
      <span class="settings-title">settings</span>
      <button class="settings-close" id="settings-close" aria-label="close">×</button>
    </div>

    <section class="settings-section">
      <div class="settings-section-label">atmosphere</div>

      <label class="setting">
        <span class="setting-label">fog</span>
        <input type="range" id="setting-fog" min="0" max="200" step="1" value="100" />
        <span class="setting-value" id="setting-fog-value">100%</span>
      </label>

      <label class="setting">
        <span class="setting-label">time of day</span>
        <input type="range" id="setting-time" min="0" max="1000" step="1" value="750" />
        <span class="setting-value" id="setting-time-value">day</span>
      </label>

      <label class="setting setting-checkbox">
        <input type="checkbox" id="setting-auto-cycle" />
        <span class="setting-label">auto day/night cycle</span>
      </label>
    </section>

    <section class="settings-section">
      <div class="settings-section-label">camera</div>

      <label class="setting setting-checkbox">
        <input type="checkbox" id="setting-auto-rotate" checked />
        <span class="setting-label">auto-rotate</span>
      </label>

      <button class="setting-button" id="setting-follow">
        <span class="setting-button-label">follow a creature</span>
        <span class="setting-button-hint">click to select</span>
      </button>

      <button class="setting-button" id="setting-reset-camera">
        <span class="setting-button-label">reset camera</span>
      </button>
    </section>
  </aside>

  <div class="follow-banner" id="follow-banner" aria-hidden="true">
    click a creature to follow it · press <kbd>esc</kbd> to cancel
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
